proxy_cache_path /var/cache/nginx/milestudy levels=1:2 keys_zone=milestudy_summary_cache:10m max_size=64m inactive=10m use_temp_path=off;

server {
  listen 80;
  server_name _;

  # Cache summary endpoint for fast repeated reads
  location = /api/prototype/summary {
    proxy_pass http://backend:8000/api/prototype/summary;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache milestudy_summary_cache;
    proxy_cache_methods GET HEAD;
    proxy_cache_key "$scheme$host$request_uri";
    proxy_cache_valid 200 1m;
    proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
    proxy_cache_background_update on;
    add_header X-Proxy-Cache $upstream_cache_status always;
  }

  # Laravel API
  location /api/ {
    proxy_pass http://backend:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Public storage files (attendance photo, etc)
  location /storage/ {
    proxy_pass http://backend:8000/storage/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Next.js Frontend
  location / {
    proxy_pass http://frontend:3000;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
