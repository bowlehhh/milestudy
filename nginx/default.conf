server {
  listen 80;
  server_name _;

  # Laravel API
  location /api/ {
    proxy_pass http://backend:8000/api/;
  }

  # Next.js Frontend
  location / {
    proxy_pass http://frontend:3000;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
