services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

  backend:
    image: php:8.4-cli
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    command: sh -lc "php -S 0.0.0.0:8000 -t public"
    depends_on:
      - mysql

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -lc "npm run dev -- -p 3000"
    depends_on:
      - backend

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: milestudy
      MYSQL_USER: milestudy
      MYSQL_PASSWORD: milestudy123
      MYSQL_ROOT_PASSWORD: root123
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
